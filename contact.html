<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Go Express Transport</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="banner">
        <h1>Contact Us</h1>
    </div>

    <div class="row">

        <div class="content">

            <h2>Get In Touch</h2>

            <p>
                We are always ready to assist you with travel bookings,
                route information, and customer support.
            </p>

            <form>

                <label for="name">Full Name:</label><br>
                <input type="text" id="name" name="name"><br><br>

                <label for="email">Email Address:</label><br>
                <input type="email" id="email" name="email"><br><br>

                <label for="message">Message:</label><br>
                <textarea id="message" rows="5" cols="40"></textarea><br><br>

                <input type="submit" value="Send Message">

            </form>

        </div>

        <div class="right_side_bar">

            <h3>Contact Information</h3>

            <p><strong>Phone:</strong> +254 112178769</p>
            <p><strong>Email:</strong> yahoo@goexpress.co.ke</p>
            <p><strong>Location:</strong> Nairobi, Kenya</p>

        </div>

    </div>

    <div class="footer">
        <p>&copy; 2026 Go Express Transport Services</p>
    </div>

</body>
</html>
